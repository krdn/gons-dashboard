# gons-dashboard — Docker Compose
#
# 배포 대상: 192.168.0.5 (docker context: home-server)
#
# 컨테이너 4개:
#   - gons-dashboard-postgres : Postgres 16, 포트 5440 → 5432
#   - gons-dashboard-redis    : Redis 7, 포트 6390 → 6379
#   - gons-dashboard-app      : Next.js, 포트 3020 (Sprint 1.6에서 추가)
#   - gons-dashboard-cron     : node-cron worker (Sprint 3에서 추가)
#
# Sprint 1.4: 인프라(postgres + redis)만 먼저 띄움. app/cron은 코드가 갖춰지는
# Sprint 1.6/Sprint 3에서 활성화.

name: gons-dashboard

services:
  postgres:
    image: postgres:16-alpine
    container_name: gons-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gons_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-gons}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - "5440:5432"
    volumes:
      - gons_dashboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gons} -d ${POSTGRES_DB:-gons_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gons-dashboard-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    environment:
      TZ: Asia/Seoul
    ports:
      - "6390:6379"
    volumes:
      - gons_dashboard_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    # autopilot 무인 배포가 digest 직접 핀(@sha256:)으로 교체할 수 있도록 ref 전체를 변수화.
    # 수동 배포 시엔 미설정 → 기본 :latest. compose 가 :${TAG} 형식이면 digest pin 불가하므로 ref 변수 필수.
    image: ${APP_IMAGE_REF:-ghcr.io/krdn/gons-dashboard:latest}
    container_name: gons-dashboard-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
      DATABASE_URL: postgresql://${POSTGRES_USER:-gons}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gons_dashboard}
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CRON_BEARER_TOKEN: ${CRON_BEARER_TOKEN}
      ALLOWLIST_EMAILS: ${ALLOWLIST_EMAILS}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      OPS_NOTIFY_EMAIL: ${OPS_NOTIFY_EMAIL:-}
      PG_ENCRYPTION_KEY: ${PG_ENCRYPTION_KEY:-}
      # PlayMCP 1FATE (호 상담 영역) — env.ts required at boot.
      PLAYMCP_GATEWAY_URL: ${PLAYMCP_GATEWAY_URL:-https://playmcp.kakao.com/mcp}
      PLAYMCP_CLIENT_ID: ${PLAYMCP_CLIENT_ID}
      PLAYMCP_BOOTSTRAP_OTT: ${PLAYMCP_BOOTSTRAP_OTT:-}
      # 서버 인프라 모니터 v0.1+
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      DOCKER_DEFAULT_CONTEXT: ${DOCKER_DEFAULT_CONTEXT:-default}
      DOCKER_CMD_TIMEOUT_MS: ${DOCKER_CMD_TIMEOUT_MS:-10000}
      # MCP mediator (Calendar MCP 파일럿)
      MCP_DASHBOARD_TOKEN: ${MCP_DASHBOARD_TOKEN}
      # KRX OpenAPI (한국거래소) — 종목 마스터 주 1회 cron 시드
      KRX_OPENAPI_AUTH_KEY: ${KRX_OPENAPI_AUTH_KEY}
      # DART OpenAPI (PR #122) — KR 종목 PBR/배당/EPS/BPS overlay
      # optional — 키 없거나 STOCK_FUNDAMENTALS_SOURCES=off 면 어댑터 silent skip
      DART_OPENAPI_AUTH_KEY: ${DART_OPENAPI_AUTH_KEY:-}
      STOCK_FUNDAMENTALS_SOURCES: ${STOCK_FUNDAMENTALS_SOURCES:-yahoo+dart}
      # Saju LLM 일일 예산 가드 (PR #148) — tri narrative 4종 + cachedReading 공용 풀.
      # .env 미설정 시에도 20000 보장(belt-and-suspenders) — 옛 기본값 1000 은
      # 실측(일일 peak ~5000원) 대비 비현실적이라 정상 사용/cron 을 조기 트립시킴.
      SAJU_LLM_DAILY_BUDGET_KRW: ${SAJU_LLM_DAILY_BUDGET_KRW:-20000}
    ports:
      - "3020:3020"
    volumes:
      # server-monitor: 호스트 docker daemon에 접근.
      # runDocker()가 `docker --context default ...` → /var/run/docker.sock 경유로 호스트 컨테이너 조회/액션.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3020/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cron:
    image: ghcr.io/krdn/gons-dashboard-cron:${APP_IMAGE_TAG:-latest}
    container_name: gons-dashboard-cron
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      TZ: Asia/Seoul
      APP_URL: http://app:3020
      CRON_BEARER_TOKEN: ${CRON_BEARER_TOKEN}
      # autopilot 무인 배포 (cron 안에서 app 재배포 — self-kill 회피)
      AUTOPILOT_DEPLOY: ${AUTOPILOT_DEPLOY:-off}
      AUTOPILOT_DOCKER_CONTEXT: default
      AUTOPILOT_COMPOSE_PATH: /home/gon/projects/gon/gons-dashboard/docker-compose.yml
      AUTOPILOT_ENV_PATH: /home/gon/projects/gon/gons-dashboard/.env
      AUTOPILOT_ROLLEDBACK_FILE: /signal/.autopilot-rolledback
    volumes:
      # autopilot: 호스트 docker daemon 접근 (app 재배포·롤백용)
      - /var/run/docker.sock:/var/run/docker.sock
      # 레포 디렉토리는 ro (compose 파일 읽기 — Gotcha #8 절대경로).
      - /home/gon/projects/gon/gons-dashboard:/home/gon/projects/gon/gons-dashboard:ro
      # .env 단일 파일만 rw 로 nested override — 배포 영속화용 APP_IMAGE_REF in-place 갱신.
      # 모든 compose up(watcher·수동·재부팅 복구)이 .env 를 자동으로 읽으므로 배포가 영속된다.
      - /home/gon/projects/gon/gons-dashboard/.env:/home/gon/projects/gon/gons-dashboard/.env:rw
      # 롤백 차단 digest 단일 소스 (rw).
      - /home/gon/projects/gon/gons-dashboard/.autopilot-signal:/signal

volumes:
  gons_dashboard_pgdata:
  gons_dashboard_redisdata:
