# gons-dashboard — Docker Compose
#
# 배포 대상: 192.168.0.5 (docker context: home-server)
#
# 컨테이너 4개:
#   - gons-dashboard-postgres : Postgres 16, 포트 5440 → 5432
#   - gons-dashboard-redis    : Redis 7, 포트 6390 → 6379
#   - gons-dashboard-app      : Next.js, 포트 3020 (Sprint 1.6에서 추가)
#   - gons-dashboard-cron     : node-cron worker (Sprint 3에서 추가)
#
# Sprint 1.4: 인프라(postgres + redis)만 먼저 띄움. app/cron은 코드가 갖춰지는
# Sprint 1.6/Sprint 3에서 활성화.

name: gons-dashboard

services:
  postgres:
    image: postgres:16-alpine
    container_name: gons-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gons_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-gons}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - "5440:5432"
    volumes:
      - gons_dashboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gons} -d ${POSTGRES_DB:-gons_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gons-dashboard-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    environment:
      TZ: Asia/Seoul
    ports:
      - "6390:6379"
    volumes:
      - gons_dashboard_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    image: ghcr.io/krdn/gons-dashboard:${APP_IMAGE_TAG:-latest}
    container_name: gons-dashboard-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
      DATABASE_URL: postgresql://${POSTGRES_USER:-gons}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gons_dashboard}
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CRON_BEARER_TOKEN: ${CRON_BEARER_TOKEN}
      ALLOWLIST_EMAILS: ${ALLOWLIST_EMAILS}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      OPS_NOTIFY_EMAIL: ${OPS_NOTIFY_EMAIL:-}
      PG_ENCRYPTION_KEY: ${PG_ENCRYPTION_KEY:-}
      # PlayMCP 1FATE (호 상담 영역) — env.ts required at boot.
      PLAYMCP_GATEWAY_URL: ${PLAYMCP_GATEWAY_URL:-https://playmcp.kakao.com/mcp}
      PLAYMCP_CLIENT_ID: ${PLAYMCP_CLIENT_ID}
      PLAYMCP_BOOTSTRAP_OTT: ${PLAYMCP_BOOTSTRAP_OTT:-}
      # 서버 인프라 모니터 v0.1+
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      DOCKER_DEFAULT_CONTEXT: ${DOCKER_DEFAULT_CONTEXT:-default}
      DOCKER_CMD_TIMEOUT_MS: ${DOCKER_CMD_TIMEOUT_MS:-10000}
      # MCP mediator (Calendar MCP 파일럿)
      MCP_DASHBOARD_TOKEN: ${MCP_DASHBOARD_TOKEN}
      # KRX OpenAPI (한국거래소) — 종목 마스터 주 1회 cron 시드
      KRX_OPENAPI_AUTH_KEY: ${KRX_OPENAPI_AUTH_KEY}
      # DART OpenAPI (PR #122) — KR 종목 PBR/배당/EPS/BPS overlay
      # optional — 키 없거나 STOCK_FUNDAMENTALS_SOURCES=off 면 어댑터 silent skip
      DART_OPENAPI_AUTH_KEY: ${DART_OPENAPI_AUTH_KEY:-}
      STOCK_FUNDAMENTALS_SOURCES: ${STOCK_FUNDAMENTALS_SOURCES:-yahoo+dart}
    ports:
      - "3020:3020"
    volumes:
      # server-monitor: 호스트 docker daemon에 접근.
      # runDocker()가 `docker --context default ...` → /var/run/docker.sock 경유로 호스트 컨테이너 조회/액션.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3020/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cron:
    image: ghcr.io/krdn/gons-dashboard-cron:${APP_IMAGE_TAG:-latest}
    container_name: gons-dashboard-cron
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      TZ: Asia/Seoul
      APP_URL: http://app:3020
      CRON_BEARER_TOKEN: ${CRON_BEARER_TOKEN}

volumes:
  gons_dashboard_pgdata:
  gons_dashboard_redisdata:
