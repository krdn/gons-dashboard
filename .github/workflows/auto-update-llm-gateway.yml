name: Auto-update @krdn/llm-gateway

on:
  repository_dispatch:
    types: [llm-gateway-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependency:
    name: Update llm-gateway to ${{ github.event.client_payload.tag }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag format
        env:
          NEW_TAG: ${{ github.event.client_payload.tag }}
        run: |
          if [[ ! "$NEW_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: $NEW_TAG (expected vX.Y.Z)"
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Update package.json
        env:
          NEW_TAG: ${{ github.event.client_payload.tag }}
        run: |
          sed -i "s|github:krdn/llm-gateway#v[0-9]*\.[0-9]*\.[0-9]*|github:krdn/llm-gateway#${NEW_TAG}|" apps/dashboard/package.json
          echo "Updated to $NEW_TAG"
          grep llm-gateway apps/dashboard/package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: a-placeholder-secret-of-at-least-32-characters
          NEXTAUTH_URL: http://localhost:3020
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder
          ANTHROPIC_BASE_URL: http://placeholder
          ANTHROPIC_API_KEY: placeholder
          CRON_BEARER_TOKEN: a-placeholder-cron-token-of-at-least-32-characters
          ALLOWLIST_EMAILS: build@placeholder.local
          ADMIN_EMAILS: build@placeholder.local
          MCP_DASHBOARD_TOKEN: a-placeholder-mcp-token-of-at-least-32-characters
          PG_ENCRYPTION_KEY: a-placeholder-pg-encryption-key-of-at-least-32-chars
          PLAYMCP_CLIENT_ID: placeholder-playmcp-client-id
          KRX_OPENAPI_AUTH_KEY: placeholder-krx-key
        run: pnpm typecheck

      - name: Create pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        env:
          NEW_TAG: ${{ github.event.client_payload.tag }}
        with:
          commit-message: "chore(deps): @krdn/llm-gateway ${{ github.event.client_payload.tag }} 업데이트"
          title: "chore(deps): @krdn/llm-gateway → ${{ github.event.client_payload.tag }}"
          body: |
            `@krdn/llm-gateway` 새 릴리스 감지 → 자동 업데이트 PR.

            **버전**: `${{ github.event.client_payload.tag }}`
            **릴리스**: https://github.com/krdn/llm-gateway/releases/tag/${{ github.event.client_payload.tag }}

            ---
            🤖 Generated by [auto-update-llm-gateway](https://github.com/krdn/gons-dashboard/actions/workflows/auto-update-llm-gateway.yml)
          branch: auto/llm-gateway-update
          delete-branch: true
          labels: dependencies
