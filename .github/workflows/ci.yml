name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_dummy
        ports:
          - 5999:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Configure git for GitHub packages
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: DB migrate (test schema)
        env:
          DATABASE_URL: postgres://test:test@127.0.0.1:5999/test_dummy
        run: pnpm db:migrate

      - name: Test
        env:
          # tests/setup.ts allow-list 가드 통과를 위해 127.0.0.1 사용.
          TEST_DATABASE_URL: postgres://test:test@127.0.0.1:5999/test_dummy
          # env.ts 부팅 검증 통과용 placeholder.
          DATABASE_URL: postgres://test:test@127.0.0.1:5999/test_dummy
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: a-placeholder-secret-of-at-least-32-characters
          NEXTAUTH_URL: http://localhost:3020
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder
          ANTHROPIC_BASE_URL: http://placeholder
          ANTHROPIC_API_KEY: placeholder
          CRON_BEARER_TOKEN: a-placeholder-cron-token-of-at-least-32-characters
          ALLOWLIST_EMAILS: build@placeholder.local
          ADMIN_EMAILS: build@placeholder.local
          MCP_DASHBOARD_TOKEN: a-placeholder-mcp-token-of-at-least-32-characters
          PG_ENCRYPTION_KEY: a-placeholder-pg-encryption-key-of-at-least-32-chars
          PLAYMCP_CLIENT_ID: placeholder-playmcp-client-id
          KRX_OPENAPI_AUTH_KEY: placeholder-krx-key
        run: pnpm test

      - name: Build MCP packages
        run: pnpm --filter @gons/mcp-calendar build

      - name: Build (sanity check)
        env:
          # 빌드 시점에는 env 검증을 우회 — 실제 값은 컨테이너 런타임에서 주입.
          # 검증 우회를 위해 테스트용 placeholder만 제공.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: ${{ secrets.PLACEHOLDER_SECRET || 'a-placeholder-secret-of-at-least-32-characters' }}
          NEXTAUTH_URL: http://localhost:3020
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder
          ANTHROPIC_BASE_URL: http://placeholder
          ANTHROPIC_API_KEY: placeholder
          CRON_BEARER_TOKEN: a-placeholder-cron-token-of-at-least-32-characters
          ALLOWLIST_EMAILS: build@placeholder.local
          ADMIN_EMAILS: build@placeholder.local
          MCP_DASHBOARD_TOKEN: a-placeholder-mcp-token-of-at-least-32-characters
          PG_ENCRYPTION_KEY: a-placeholder-pg-encryption-key-of-at-least-32-chars
          PLAYMCP_CLIENT_ID: placeholder-playmcp-client-id
          KRX_OPENAPI_AUTH_KEY: placeholder-krx-key
        run: pnpm build

  docker:
    name: Build & Push Docker Images
    needs: lint-typecheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/krdn/gons-dashboard:latest
            ghcr.io/krdn/gons-dashboard:sha-${{ github.sha }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

      - name: Build & push cron image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/cron
          file: ./apps/cron/Dockerfile
          push: true
          tags: |
            ghcr.io/krdn/gons-dashboard-cron:latest
            ghcr.io/krdn/gons-dashboard-cron:sha-${{ github.sha }}
          cache-from: type=gha,scope=cron
          cache-to: type=gha,mode=max,scope=cron
