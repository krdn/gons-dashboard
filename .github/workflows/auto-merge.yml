name: Auto-merge
on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]
permissions:
  contents: read
  pull-requests: read
jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    # draft 제외 + fork 제외 (본인 non-draft PR 만)
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      # GitHub App 토큰으로 auto-merge 를 enable 해야 머지 커밋이 App identity 로 attribution 되어
      # main push 가 CI(docker-build) 를 정상 트리거한다. GITHUB_TOKEN 으로 enable 하면 머지 커밋이
      # github-actions[bot] attribution → push 워크플로 억제(재귀 방지 규칙) → 이미지 안 빌드됨.
      # 필요한 레포 secret: APP_ID, APP_PRIVATE_KEY (설계 §5.2 참조).
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Enable native auto-merge
        # PR 번호는 정수지만 SAFE 패턴(env 경유)으로 전달.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        # 'gh pr merge --auto'는 GitHub native auto-merge 를 켤 뿐 직접 머지하지 않는다.
        # 실제 머지는 GitHub 이 CI green 시 수행. App 토큰 attribution 이라 docker-build 트리거됨.
        # --repo: checkout 없이 API 로만 동작 (git 저장소 컨텍스트 불요).
        run: gh pr merge --auto --squash --repo "$REPO" "$PR_NUMBER"
